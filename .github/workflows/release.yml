name: Build Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            name: macos-arm64
            artifact: OptiMIMO
          - os: macos-13
            name: macos-x86_64
            artifact: OptiMIMO
          - os: windows-latest
            name: windows-x86_64
            artifact: OptiMIMO.exe
          - os: ubuntu-latest
            name: linux-x86_64
            artifact: OptiMIMO

    runs-on: ${{ matrix.os }}
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-build.txt
          pip install -e ".[gui]"

      - name: Build binary (Unix)
        if: runner.os != 'Windows'
        run: |
          python build.py --clean
          chmod +x releases/OptiMIMO-*

      - name: Build binary (Windows)
        if: runner.os == 'Windows'
        run: |
          python build.py --clean

      - name: Verify binary exists
        run: |
          python - <<'PY'
          from pathlib import Path
          
          release_dir = Path("releases")
          if not release_dir.is_dir():
              raise SystemExit("releases directory not found")
          
          files = sorted(release_dir.glob("OptiMIMO-*"))
          for path in files:
              print(path)
          
          if not files:
              raise SystemExit("No release binaries found in releases/")
          PY

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: OptiMIMO-${{ matrix.name }}
          path: releases/OptiMIMO-*
          retention-days: 30

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/OptiMIMO-*
          draft: false
          prerelease: false
          generate_release_notes: true
